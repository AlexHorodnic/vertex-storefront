<article class="product-card">
  <a
    class="product-card__media"
    [routerLink]="['/products', product().slug]"
    [attr.aria-label]="'View ' + product().name"
  >
    <img [src]="product().imageUrl" [alt]="product().name" loading="lazy" />
    @if (product().badge; as badge) {
      <app-badge>{{ badge }}</app-badge>
    }
  </a>

  <div class="product-card__body">
    <div class="product-card__meta">
      <app-rating [rating]="product().rating" [reviewCount]="product().reviewCount" />
      <span [class]="stockClass()">{{ product().stockStatus }}</span>
    </div>

    <h3>
      <a [routerLink]="['/products', product().slug]">{{ product().name }}</a>
    </h3>
    <span class="product-card__category">{{ product().categoryName }}</span>
    <p>{{ product().description }}</p>

    <div class="product-card__footer">
      <app-price [amount]="product().price" [compareAt]="product().originalPrice" />
      <button
        class="button button--small"
        type="button"
        (click)="addToCart()"
        [disabled]="product().stock === 0"
      >
        {{ product().stock === 0 ? 'Sold out' : 'Add' }}
      </button>
    </div>
  </div>
</article>
